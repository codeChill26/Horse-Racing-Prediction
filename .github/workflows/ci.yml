name: CI/CD

on:
  push:
    branches:
      - main
      - feature/AI
  pull_request:
    branches:
      - main

# Push liên tiếp lên cùng một nhánh: huỷ run cũ, chỉ giữ run mới nhất.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Build React App
        run: npm run build

  backend:
    name: Backend CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    # ĐÃ BỎ unit/integration test -> KHÔNG cần Postgres/Redis service, không cần
    # pgcrypto, không cần db push. Job này giờ chỉ xác minh: cài được dependency
    # và sinh được Prisma Client (tức code đóng gói được).
    env:
      # prisma generate CHỈ đọc chuỗi kết nối để sinh code, KHÔNG kết nối thật
      # -> giá trị giả là đủ (giống build-arg ở job docker bên dưới).
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/postgres

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # npm ci KHÔNG tự sinh Prisma Client — backend/Dockerfile cũng phải gọi tay bước này.
      - name: Generate Prisma Client
        run: npx prisma generate

  ai:
    name: AI CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ai

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ai/requirements.txt

      # ĐÃ BỎ pytest -> chỉ xác minh cài được dependency.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    # Không tốn runner build image khi code đã hỏng.
    needs:
      - backend
      - ai

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      # backend/Dockerfile chạy `npx prisma generate` lúc build nên cần 2 build-arg này.
      # Giá trị giả là đủ: generate chỉ đọc chuỗi kết nối, không kết nối thật.
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          build-args: |
            DATABASE_URL=postgresql://postgres:postgres@localhost:5432/postgres
            DIRECT_URL=postgresql://postgres:postgres@localhost:5432/postgres
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build AI image
        uses: docker/build-push-action@v6
        with:
          context: ./ai
          push: false
          cache-from: type=gha,scope=ai
          cache-to: type=gha,mode=max,scope=ai

  # ---------------------------------------------------------------------------
  # CD — Tự deploy Backend + AI lên Render khi push nhánh feature/AI
  # ---------------------------------------------------------------------------
  deploy-render:
    name: Deploy Render (Backend + AI)
    runs-on: ubuntu-latest

    # "Chỉ deploy nếu KHÔNG có lỗi": job này chỉ chạy khi TẤT CẢ job kiểm tra
    # phía trên đã xanh. Bất kỳ job nào đỏ -> deploy bị bỏ qua, Render giữ
    # nguyên bản đang chạy (không đè bản hỏng lên).
    needs:
      - frontend
      - backend
      - ai
      - docker

    # Chỉ deploy khi PUSH lên feature/AI. Pull request KHÔNG deploy.
    if: github.event_name == 'push' && github.ref == 'refs/heads/feature/AI'

    steps:
      - name: Kiểm tra secrets đã cấu hình chưa
        env:
          HOOK_BE: ${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}
          HOOK_AI: ${{ secrets.RENDER_DEPLOY_HOOK_AI }}
        run: |
          if [ -z "$HOOK_BE" ]; then
            echo "::error::Thiếu secret RENDER_DEPLOY_HOOK_BACKEND (Settings > Secrets and variables > Actions)"
            exit 1
          fi
          if [ -z "$HOOK_AI" ]; then
            echo "::error::Thiếu secret RENDER_DEPLOY_HOOK_AI (Settings > Secrets and variables > Actions)"
            exit 1
          fi

      # Deploy hook của Render đã có sẵn query "?key=..." nên nối thêm bằng '&'.
      # ref=<sha>: bắt Render deploy ĐÚNG commit vừa push (last commit), thay vì
      # HEAD của nhánh mà service đang cấu hình.
      - name: Trigger Render deploy - Backend
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}
        run: |
          curl -fsS -X POST "${HOOK}&ref=${{ github.sha }}"
          echo "Đã gửi lệnh deploy Backend cho commit ${{ github.sha }}"

      - name: Trigger Render deploy - AI
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_AI }}
        run: |
          curl -fsS -X POST "${HOOK}&ref=${{ github.sha }}"
          echo "Đã gửi lệnh deploy AI cho commit ${{ github.sha }}"
