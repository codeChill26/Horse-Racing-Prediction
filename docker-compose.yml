services:
  backend_app:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@localhost:5432/postgres}
        DIRECT_URL: ${DIRECT_URL:-postgresql://postgres:postgres@localhost:5432/postgres}
    container_name: horse_racing_backend
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      - REDIS_URL=redis://horse_racing_redis:6379
      - PORT=3000
    depends_on:
      redis_cache:
        condition: service_healthy

  postgres_db:
    profiles:
      - local-db
    image: postgres:15-alpine
    container_name: horse_racing_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
      POSTGRES_DB: horse_racing
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d horse_racing"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis_cache:
    image: redis:7-alpine
    container_name: horse_racing_redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
