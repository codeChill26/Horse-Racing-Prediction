services:
  backend_app:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        DATABASE_URL: ${DATABASE_URL}
    container_name: horse_racing_backend
    restart: always
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    env_file:
      - ./backend/.env
    environment:
      - REDIS_URL=redis://horse_racing_redis:6379
      - PORT=${PORT:-3000}
    depends_on:
      redis_cache:
        condition: service_healthy

  postgres_db:
    profiles:
      - local-db
    image: postgres:15-alpine
    container_name: horse_racing_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-horse_racing}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  redis_cache:
    image: redis:7-alpine
    container_name: horse_racing_redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
